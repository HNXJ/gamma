<!DOCTYPE html>
<html>
<head>
    <title>SDE Game Monitor | Port 3012</title>
    <meta http-equiv="refresh" content="5">
    <style>
        body { background-color: #0D0D0D; color: #E0E0E0; font-family: monospace; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: #1A1A1A; padding: 15px; border: 1px solid #2D2D2D; border-radius: 5px; }
        .bubble { background: #2D2D2D; padding: 10px; border-radius: 5px; margin: 5px 0; font-size: 12px; }
        .agent-macro { color: #CFB87C; }
        .agent-meso { color: #9400D3; }
        .agent-micro { color: #00CC96; }
        .agent-critic { color: #EF553B; }
        .stat { font-size: 20px; color: #CFB87C; }
    </style>
</head>
<body>
    <div style="display:flex; justify-content: space-between;">
        <h1>Council Monitor</h1>
        <div>TPS: <span class="stat">{{ tps }}</span> | Total Tokens: {{ total_tokens }}</div>
    </div>
    <div class="grid">
        <div class="panel">
            <h3>Council Chat</h3>
            {% for entry in dialogue %}
            <div class="bubble">
                <span class="activity-time">{{ entry.time }}</span>
                <span class="{{ 'agent-macro' if 'Macro' in entry.agent else ('agent-meso' if 'Meso' in entry.agent else ('agent-micro' if 'Micro' in entry.agent else 'agent-critic')) }}">
                    [{{ entry.agent }}] {{ entry.msg }}
                </span>
            </div>
            {% endfor %}
        </div>
        <div class="panel">
            <h3>Manifold Convergence</h3>
            {{ graph_html | safe }}
        </div>
    </div>
</body>
</html>

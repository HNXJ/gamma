name: GCP Auth Validation

on:
  push:
    branches:
      - office-dev
  workflow_dispatch:

jobs:
  validate-auth:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/71704346823/locations/global/workloadIdentityPools/gamma-wif-pool/providers/github-provider
          service_account: gamma-gh-deployer@gen-lang-client-0755786908.iam.gserviceaccount.com

      - name: Verify Authentication
        run: |
          gcloud auth list
          gcloud run services list --region=europe-west1

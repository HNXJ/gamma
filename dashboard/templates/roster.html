<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORLD INHABITANTS | Gamma Arena</title>
    <link rel="stylesheet" href="/static/css/arena.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@300;400;700&family=Outfit:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --panel: rgba(20, 20, 25, 0.7);
            --accent: #FFB800;
            --accent-glow: rgba(255, 184, 0, 0.3);
            --success: #00FF85;
            --blue: #00F0FF;
            --border: rgba(255, 255, 255, 0.08);
            --text: #e0e0e0;
            --text-dim: #808080;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px;
            background-image: radial-gradient(circle at 50% 0%, #1a1a20 0%, #0a0a0c 100%);
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            letter-spacing: 4px;
            margin: 0;
            background: linear-gradient(to right, #fff, var(--text-dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--panel);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent);
            opacity: 0.3;
        }

        .card.core::before { background: var(--blue); }

        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .id-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: var(--accent);
        }

        .state-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 2px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .display-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .role {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .meta-line {
            font-size: 11px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }

        .legend {
            margin-top: 60px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            padding: 20px;
            display: flex;
            gap: 40px;
            font-size: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .btn-back {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 20px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            transition: all 0.2s;
        }

        .btn-back:hover {
            background: white;
            color: black;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <p style="color: var(--accent); font-size: 10px; letter-spacing: 2px; margin-bottom: 4px;">OPERATIONAL SURFACE</p>
            <h1>WORLD INHABITANTS</h1>
        </div>
        <button class="btn-back" onclick="window.location.href='/'">RETURN TO ARENA</button>
    </div>

    <div class="grid" id="roster-grid">
        <!-- Filled via JS -->
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="dot" style="background: var(--blue);"></div>
            <div>
                <div style="font-weight: 700;">CORE ACTOR</div>
                <div style="color: var(--text-dim); font-size: 10px;">Canonical runtime logic agents (G/J/M series)</div>
            </div>
        </div>
        <div class="legend-item">
            <div class="dot" style="background: var(--accent);"></div>
            <div>
                <div style="font-weight: 700;">PERSISTED IDENTITY</div>
                <div style="color: var(--text-dim); font-size: 10px;">Developer guests with canonical disk persistence</div>
            </div>
        </div>
        <div class="legend-item">
            <div class="dot" style="background: var(--text-dim);"></div>
            <div>
                <div style="font-weight: 700;">OBSERVER PENDING</div>
                <div style="color: var(--text-dim); font-size: 10px;">Identities awaiting full runtime integration</div>
            </div>
        </div>
    </div>

    <script>
        async function loadRoster() {
            try {
                const res = await fetch('/api/agents');
                const agents = await res.json();
                
                const grid = document.getElementById('roster-grid');
                grid.innerHTML = agents.map(a => {
                    const name = a.name || a.display_name || a.id;
                    const role = a.role || 'Agent';
                    const status = a.status || a.state || 'UNKNOWN';
                    const category = a.category || 'CORE';
                    const description = a.description || 'Authenticated inhabitant of the Gamma exploratory layer.';
                    const provenance = a.provenance || 'CANONICAL';
                    
                    return `
                    <div class="card ${category === 'Core Actor' ? 'core' : ''}">
                        <div class="card-header">
                            <span class="id-tag">${a.id}</span>
                            <div style="display: flex; gap: 6px;">
                                <span class="state-badge" style="border-color: ${status === 'ACTIVE' ? 'var(--success)' : 'var(--text-dim)'}; color: ${status === 'ACTIVE' ? 'var(--success)' : 'var(--text-dim)'}">
                                    ${status}
                                </span>
                                <span class="state-badge" style="border-color: var(--blue); color: var(--blue); opacity: 0.8;">
                                    ${category}
                                </span>
                            </div>
                        </div>
                        <div class="display-name">${name}</div>
                        <div class="role">${role}</div>
                        <div style="font-size: 11px; opacity: 0.8; height: 32px; overflow: hidden; line-height: 1.4;">
                            ${description}
                        </div>
                        <div class="meta-line">
                            <span style="color: var(--text-dim); font-weight: 700;">PROVENANCE</span>
                            <span style="color: var(--accent); font-family: 'JetBrains Mono', monospace;">${provenance}</span>
                        </div>
                    </div>
                `}).join('');

            } catch (e) {
                console.error("Roster load failed", e);
            }
        }
        loadRoster();
    </script>
</body>
</html>

    description: Exploit dendritic coincidence and branch-local nonlinear computation.
  - name: Laminar Prediction Loop
    description: L4-L2/3-L5 predictive routing is now authorized (L4 delayed sensory, L2/3 context, L5 target/mismatch).
  - name: Mismatch Readout
    description: Layer-specific mismatch/error signals become first-class metrics.
  - name: Sparse Superficial Coding
    description: L2/3 sparsity is a valid target phenotype.

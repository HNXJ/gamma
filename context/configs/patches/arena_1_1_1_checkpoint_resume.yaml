patch_id: arena_1_1_1_checkpoint_resume
base_version: arena_1_1_0
status: active
type: persistence_protocol
title: "First-Class Checkpoint and Resume Activation"
description: >
  Formalizes the persistence layer for the Unified Orchestrator.
  Ensures research progress (Blackboards, Sessions) survives runtime restarts.
  Introduces 'Persistence / Recovery' telemetry to the operator console.

rules:
  - "Every successful session execution must trigger an automated checkpoint."
  - "Heartbeat turns must trigger a checkpoint to prevent state drift."
  - "The UI must visualize checkpoint freshness and resume history."
  - "The neuron ladder must use semantic classes for state clarity."

ui_unlocks:
  cards:
    - id: persistence_recovery_status
      title: "Persistence / Recovery Status"
      metrics: [boot_type, resume_count, last_checkpoint, freshness]

implementation_status:
  orchestrator: COMPLETED
  blackboard: COMPLETED
  monitor_proxy: COMPLETED
  ui_rendering: COMPLETED
